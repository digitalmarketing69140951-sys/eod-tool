<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Audit — Digit Web Lanka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #4f46e5;
      --brand-l:    #6366f1;
      --brand-dim:  rgba(79,70,229,0.08);
      --brand-dim2: rgba(79,70,229,0.18);
      --bg:         #f0f2f8;
      --surface:    #ffffff;
      --surface2:   #f8f9fb;
      --border:     #e4e7ef;
      --text:       #0f1724;
      --text-2:     #6b7280;
      --text-3:     #9ca3af;
      --green:      #10b981;
      --green-dim:  rgba(16,185,129,0.1);
      --amber:      #d97706;
      --amber-dim:  rgba(217,119,6,0.1);
      --red:        #dc2626;
      --red-dim:    rgba(220,38,38,0.08);
      --radius-sm:  10px;
      --radius:     14px;
      --radius-lg:  22px;
      --shadow:     0 4px 24px rgba(79,70,229,0.07), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-sm:  0 1px 4px rgba(0,0,0,0.06);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding-bottom: 5rem;
    }

    /* ════ TOPBAR ════ */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      height: 62px; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: var(--shadow-sm);
    }

    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }

    .t-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), var(--brand-l));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 800; color: #fff;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }

    .t-name  { font-weight: 700; font-size: 0.9375rem; letter-spacing: -0.01em; }

    .t-badge {
      font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.04em;
      color: var(--brand); background: var(--brand-dim);
      border: 1px solid var(--brand-dim2);
      padding: 0.2rem 0.65rem; border-radius: 100px;
    }

    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }

    .week-label {
      font-size: 0.8125rem; color: var(--text-2); font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-nav {
      font-size: 0.75rem; font-weight: 600; color: var(--text-2);
      text-decoration: none; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.35rem 0.75rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-nav:hover { color: var(--brand); border-color: var(--brand); }

    .btn-reload {
      font-size: 0.75rem; font-weight: 600; color: var(--brand);
      background: var(--brand-dim); border: 1.5px solid var(--brand-dim2);
      border-radius: var(--radius-sm); padding: 0.35rem 0.75rem;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }
    .btn-reload:hover { background: var(--brand-dim2); }

    /* ════ TOKEN OVERLAY ════ */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,36,0.55); z-index: 200;
      align-items: center; justify-content: center;
      padding: 1rem; backdrop-filter: blur(5px);
    }
    .overlay.on { display: flex; animation: fadeIn 0.2s ease; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 2.25rem;
      width: 100%; max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15);
      animation: slideUp 0.25s cubic-bezier(0.34,1.2,0.64,1);
    }

    .modal-icon {
      width: 52px; height: 52px; background: var(--brand-dim);
      border: 1.5px solid var(--brand-dim2); border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: 1.25rem;
    }

    .modal h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
    .modal p  { font-size: 0.875rem; color: var(--text-2); line-height: 1.6; margin-bottom: 1.5rem; }

    .f-label { font-size: 0.8125rem; font-weight: 600; display: block; margin-bottom: 0.4rem; }

    .f-wrap { position: relative; }
    .f-wrap input {
      width: 100%; height: 46px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 0 2.75rem 0 0.9rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8125rem;
      color: var(--text); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .f-wrap input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-dim2); }

    .f-eye {
      position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-3);
    }

    .f-hint { font-size: 0.75rem; color: var(--text-3); margin-top: 0.4rem; }
    .f-err  { font-size: 0.8rem; color: var(--red); margin-top: 0.6rem; display: none; }

    .btn-primary {
      width: 100%; height: 46px; margin-top: 1.25rem;
      background: linear-gradient(135deg, var(--brand), var(--brand-l)); color: #fff;
      font-family: 'Inter', sans-serif; font-size: 0.9375rem; font-weight: 700;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      box-shadow: 0 4px 14px rgba(79,70,229,0.3);
      transition: opacity 0.15s;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ════ DETAIL OVERLAY ════ */
    .detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,36,0.6); z-index: 300;
      align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; overflow-y: auto;
      backdrop-filter: blur(6px);
    }
    .detail-overlay.on { display: flex; animation: fadeIn 0.2s ease; }

    .detail-modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); width: 100%; max-width: 760px;
      padding: 2.5rem; position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15);
      animation: slideUp 0.25s ease;
    }

    .d-close {
      position: absolute; top: 1.25rem; right: 1.25rem;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-2); border-radius: 8px; width: 32px; height: 32px;
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .d-close:hover { background: var(--border); }

    /* ════ MARKDOWN RENDER ════ */
    .md-body { padding-top: 0.5rem; }

    .md-body h1 {
      font-size: 1.4rem; font-weight: 800; color: var(--text);
      letter-spacing: -0.03em; margin-bottom: 0.5rem;
      padding-bottom: 0.75rem; border-bottom: 2px solid var(--border);
    }

    .md-body h2 {
      font-size: 1rem; font-weight: 800; color: var(--text);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-top: 1.75rem; margin-bottom: 0.75rem;
      padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
    }

    .md-body h3 {
      font-size: 0.875rem; font-weight: 700; color: var(--brand);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-top: 1.25rem; margin-bottom: 0.5rem;
    }

    .md-body p {
      font-size: 0.9rem; color: var(--text-2); line-height: 1.7;
      margin-bottom: 0.6rem;
    }

    .md-body ul {
      list-style: none; padding: 0; margin-bottom: 0.75rem;
    }

    .md-body ul li {
      font-size: 0.875rem; color: var(--text); line-height: 1.65;
      padding: 0.35rem 0 0.35rem 1.25rem; position: relative;
      border-bottom: 1px solid var(--border);
    }

    .md-body ul li:last-child { border-bottom: none; }

    .md-body ul li::before {
      content: "→"; position: absolute; left: 0;
      color: var(--brand); font-weight: 700; font-size: 0.75rem;
      top: 0.4rem;
    }

    .md-body strong { font-weight: 700; color: var(--text); }

    .md-body hr {
      border: none; border-top: 1px solid var(--border); margin: 1.25rem 0;
    }

    .md-body .meta-line {
      font-size: 0.8125rem; color: var(--text-2);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 1.5rem;
    }

    .md-body .verdict-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-left: 4px solid var(--brand);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 0.875rem 1rem; margin: 0.75rem 0;
      font-size: 0.875rem; color: var(--text); line-height: 1.6;
      font-style: italic;
    }

    .score-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; font-weight: 700;
      padding: 0.3rem 0.8rem; border-radius: var(--radius-sm);
      margin-bottom: 1rem;
    }

    .score-green { background: var(--green-dim); color: #059669; }
    .score-amber { background: var(--amber-dim); color: var(--amber); }
    .score-red   { background: var(--red-dim);   color: var(--red); }

    .d-footer { display: flex; gap: 0.75rem; margin-top: 1.75rem; }

    .btn-copy {
      flex: 1; height: 42px;
      background: linear-gradient(135deg, var(--brand), var(--brand-l)); color: #fff;
      font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 700;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      box-shadow: 0 4px 12px rgba(79,70,229,0.3); transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.88; }
    .btn-copy.copied { background: var(--green); box-shadow: none; }

    /* ════ MAIN LAYOUT ════ */
    .main { max-width: 980px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    .page-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;
    }

    .page-head h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .page-week { font-size: 0.8125rem; color: var(--text-2); font-family: 'JetBrains Mono', monospace; margin-top: 0.2rem; }

    .pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .pill {
      font-size: 0.75rem; font-weight: 700; font-family: 'JetBrains Mono', monospace;
      padding: 0.25rem 0.75rem; border-radius: 100px;
    }
    .pill-g { background: var(--green-dim); color: #059669; border: 1px solid rgba(16,185,129,0.25); }
    .pill-a { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(217,119,6,0.25); }
    .pill-r { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(220,38,38,0.2); }

    /* ════ LEADERBOARD ════ */
    .lb {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      margin-bottom: 2rem; box-shadow: var(--shadow);
    }

    .lb-header {
      background: var(--surface2); padding: 0.875rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between;
    }

    .lb-header span { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); }

    .lb-row {
      padding: 0.8rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(79,70,229,0.03); }

    .lb-rank { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-3); width: 24px; text-align: right; }
    .lb-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
    .lb-verdict { font-size: 0.75rem; color: var(--text-2); flex: 2; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-style: italic; }

    .sc {
      font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; font-weight: 700;
      min-width: 50px; text-align: center; padding: 0.25rem 0.6rem; border-radius: 6px;
    }
    .sc-g { background: var(--green-dim); color: #059669; }
    .sc-a { background: var(--amber-dim); color: var(--amber); }
    .sc-r { background: var(--red-dim);   color: var(--red); }
    .sc-x { background: var(--surface2);  color: var(--text-3); }

    /* ════ CARDS ════ */
    .cards { display: grid; gap: 1.25rem; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      cursor: pointer; transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow);
    }
    .card:hover { border-color: rgba(79,70,229,0.3); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,0.1); }

    .card-head {
      padding: 1.1rem 1.25rem 0.9rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .card-name  { font-weight: 700; font-size: 0.95rem; }
    .card-foot  { padding: 0.75rem 1.25rem 1rem; font-size: 0.8rem; color: var(--text-2); line-height: 1.55; font-style: italic; }

    /* ════ STATE BOX ════ */
    .state-box {
      text-align: center; padding: 5rem 1rem;
      color: var(--text-3); font-size: 0.875rem;
    }
    .state-icon  { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-title { font-size: 1rem; font-weight: 600; color: var(--text-2); margin-bottom: 0.4rem; }

    .spin {
      width: 30px; height: 30px; margin: 0 auto 0.75rem;
      border: 2.5px solid var(--border); border-top-color: var(--brand);
      border-radius: 50%; animation: spinning 0.7s linear infinite;
    }

    /* ════ ANIMATIONS ════ */
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes spinning { to{transform:rotate(360deg)} }

    @media (max-width: 600px) {
      .topbar { padding: 0 1rem; }
      .lb-verdict { display: none; }
      .week-label { display: none; }
    }
  </style>
</head>
<body>

<!-- TOKEN OVERLAY -->
<div class="overlay" id="tokenOverlay">
  <div class="modal">
    <div class="modal-icon">🔑</div>
    <h2>GitHub Token Required</h2>
    <p>Enter your GitHub Personal Access Token to read EOD audit reports from the repository.</p>
    <label class="f-label">GitHub Personal Access Token</label>
    <div class="f-wrap">
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false" />
      <button class="f-eye" id="tokenEye">👁</button>
    </div>
    <div class="f-hint">Stored in your browser only · needs <strong>repo</strong> scope</div>
    <div class="f-err" id="tokenErr"></div>
    <button class="btn-primary" id="tokenSave">Access Reports →</button>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-modal">
    <button class="d-close" id="detailClose">✕</button>
    <div id="detailContent"></div>
    <div class="d-footer">
      <button class="btn-copy" id="detailCopy">Copy Raw Report</button>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="t-logo">DM</div>
    <span class="t-name">Digit Web Lanka</span>
    <span class="t-badge">Weekly Audit</span>
  </div>
  <div class="topbar-right">
    <input type="date" id="fromDate" style="height:34px;background:#f8f9fb;border:1.5px solid #e4e7ef;border-radius:8px;color:#0f1724;font-family:'JetBrains Mono',monospace;font-size:0.78rem;padding:0 0.6rem;outline:none;cursor:pointer;" />
    <span style="font-size:0.8rem;color:#9ca3af;font-weight:600;">→</span>
    <input type="date" id="toDate" style="height:34px;background:#f8f9fb;border:1.5px solid #e4e7ef;border-radius:8px;color:#0f1724;font-family:'JetBrains Mono',monospace;font-size:0.78rem;padding:0 0.6rem;outline:none;cursor:pointer;" />
    <button class="btn-reload" id="loadBtn">Load →</button>
    <a href="index.html" class="btn-nav">← EOD Form</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div id="stateBox" class="state-box">
    <div class="spin"></div>
    <div class="state-title">Loading this week's reports…</div>
    <div>Reading from GitHub</div>
  </div>

  <div id="results" style="display:none">
    <div class="page-head">
      <div>
        <h1>Weekly Audit Results</h1>
        <div class="page-week" id="pageWeek"></div>
      </div>
      <div class="pills" id="pills"></div>
    </div>

    <div class="lb" id="lb">
      <div class="lb-header">
        <span>Score Ranking</span>
        <span id="memberCount"></span>
      </div>
      <div id="lbRows"></div>
    </div>

    <div class="cards" id="cards"></div>
  </div>

</div>

<script>
  const REPO_OWNER = "digitalmarketing69140951-sys";
  const REPO_NAME  = "eod-reports";
  const GH_KEY     = "eod_gh_token";
  const CACHE_KEY  = "eod_summary_cache";

  const getToken  = () => localStorage.getItem(GH_KEY) || "";
  const saveToken = t  => localStorage.setItem(GH_KEY, t.trim());

  function toISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function formatDate(d) {
    return new Date(d + "T00:00:00").toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
  }

  // ── GitHub API ─────────────────────────────────
  const ghHeaders = () => ({
    "Authorization": `Bearer ${getToken()}`,
    "Accept": "application/vnd.github+json",
    "X-GitHub-Api-Version": "2022-11-28"
  });

  async function fetchMD(path) {
    const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, { headers: ghHeaders() });
    if (!r.ok) return null;
    const j = await r.json();
    try { return atob(j.content.replace(/\n/g,"")); } catch(e) { return null; }
  }

  async function listDir(path) {
    const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, { headers: ghHeaders() });
    if (!r.ok) return [];
    return r.json();
  }

  // ── Markdown parser ────────────────────────────
  function renderMarkdown(md) {
    const lines = md.split("\n");
    let html = "";
    let inUl = false;

    const closeUl = () => { if (inUl) { html += "</ul>"; inUl = false; } };
    const escape  = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    const inline = s =>
      escape(s)
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/`(.+?)`/g, `<code style="font-family:'JetBrains Mono',monospace;font-size:0.8em;background:#f0f2f8;padding:0.1em 0.3em;border-radius:3px">$1</code>`);

    for (let i = 0; i < lines.length; i++) {
      const l = lines[i];

      if (/^#{1}\s/.test(l)) {
        closeUl();
        const txt = l.replace(/^#+\s/, "");
        html += `<h1>${inline(txt)}</h1>`;
        continue;
      }
      if (/^#{2}\s/.test(l)) {
        closeUl();
        const txt = l.replace(/^#+\s/, "");
        html += `<h2>${inline(txt)}</h2>`;
        continue;
      }
      if (/^#{3}\s/.test(l)) {
        closeUl();
        const txt = l.replace(/^#+\s/, "");
        html += `<h3>${inline(txt)}</h3>`;
        continue;
      }
      if (/^---+$/.test(l.trim())) {
        closeUl();
        html += "<hr>";
        continue;
      }
      if (/^[-•*]\s/.test(l)) {
        if (!inUl) { html += "<ul>"; inUl = true; }
        html += `<li>${inline(l.replace(/^[-•*]\s/, ""))}</li>`;
        continue;
      }
      if (/^\s+[-•]\s/.test(l)) {
        if (!inUl) { html += "<ul>"; inUl = true; }
        html += `<li>${inline(l.replace(/^\s+[-•]\s/, ""))}</li>`;
        continue;
      }
      // verdict line detection
      if (/This week,/i.test(l) && l.trim()) {
        closeUl();
        html += `<div class="verdict-box">${inline(l.trim())}</div>`;
        continue;
      }
      // Period / metadata line
      if (/^Period:/i.test(l.trim())) {
        closeUl();
        html += `<div class="meta-line">${inline(l.trim())}</div>`;
        continue;
      }
      if (l.trim() === "") {
        closeUl();
        continue;
      }
      closeUl();
      html += `<p>${inline(l.trim())}</p>`;
    }
    closeUl();
    return html;
  }

  function extractScore(text) {
    const m = text.match(/WEEKLY SCORE[\s\S]{0,50}?(\d{1,3})/i);
    return m ? parseInt(m[1]) : null;
  }

  function extractVerdict(text) {
    const m = text.match(/This week,\s*([^\n]+)/i);
    return m ? m[0].trim() : "";
  }

  function scClass(s) {
    if (s === null) return "sc-x";
    if (s >= 70)   return "sc-g";
    if (s >= 40)   return "sc-a";
    return "sc-r";
  }

  function scoreClass(s) {
    if (s === null) return "score-amber";
    if (s >= 70)   return "score-green";
    if (s >= 40)   return "score-amber";
    return "score-red";
  }

  const $ = id => document.getElementById(id);

  // ── State ─────────────────────────────────────
  let currentMembers = [];
  let currentRaw     = {};
  let selectedFrom   = "";
  let selectedTo     = "";

  // ── Init — show empty state, wait for user ─────
  $("stateBox").innerHTML = `
    <div class="state-icon">📅</div>
    <div class="state-title">Select a date range</div>
    <div>Pick From and To dates above, then click Load</div>`;

  if (!getToken()) $("tokenOverlay").classList.add("on");

  // ── Token setup ────────────────────────────────
  $("tokenEye").onclick = () => {
    const show = $("tokenInput").type === "password";
    $("tokenInput").type = show ? "text" : "password";
    $("tokenEye").textContent = show ? "🙈" : "👁";
  };

  $("tokenSave").onclick = async () => {
    const t = $("tokenInput").value.trim();
    $("tokenErr").style.display = "none";
    if (!t.startsWith("ghp_") && !t.startsWith("github_pat_")) {
      $("tokenErr").textContent = "⚠ Must start with ghp_";
      $("tokenErr").style.display = "block"; return;
    }
    $("tokenSave").disabled = true; $("tokenSave").textContent = "Verifying…";
    try {
      const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
        headers: { "Authorization": `Bearer ${t}`, "Accept": "application/vnd.github+json" }
      });
      if (!r.ok) throw new Error(`GitHub error ${r.status}`);
      saveToken(t);
      $("tokenOverlay").classList.remove("on");
    } catch(e) {
      $("tokenErr").textContent = `⚠ ${e.message}`;
      $("tokenErr").style.display = "block";
    } finally {
      $("tokenSave").disabled = false; $("tokenSave").textContent = "Access Reports →";
    }
  };

  $("tokenInput").onkeydown = e => { if (e.key === "Enter") $("tokenSave").click(); };

  // ── Load button ────────────────────────────────
  $("loadBtn").onclick = () => {
    const from = $("fromDate").value;
    const to   = $("toDate").value;
    if (!from || !to) {
      alert("Please select both From and To dates.");
      return;
    }
    if (from > to) {
      alert("From date must be before To date.");
      return;
    }
    selectedFrom = from;
    selectedTo   = to;
    loadRange(from, to);
  };

  // ── Load range ─────────────────────────────────
  async function loadRange(fromISO, toISO) {
    if (!getToken()) { $("tokenOverlay").classList.add("on"); return; }

    $("results").style.display = "none";
    $("stateBox").style.display = "";
    $("stateBox").innerHTML = `<div class="spin"></div><div class="state-title">Loading reports…</div><div>Reading EOD files from GitHub</div>`;

    try {
      const folders = await listDir("eods");
      if (!folders || !folders.length) throw new Error("No eods/ folder found");

      const members = [];
      const raw = {};

      for (const folder of folders) {
        if (folder.type !== "dir") continue;
        const name = folder.name;

        const files = await listDir(`eods/${name}`);
        if (!files || !files.length) continue;

        const rangeFiles = files.filter(f => {
          const d = f.name.replace(".md","");
          return d >= fromISO && d <= toISO;
        });

        if (!rangeFiles.length) continue;

        let combined = "";
        for (const f of rangeFiles.sort((a,b) => a.name.localeCompare(b.name))) {
          const content = await fetchMD(`eods/${name}/${f.name}`);
          if (content) combined += `\n\n---\n**${f.name.replace(".md","")}**\n\n${content}`;
        }

        if (!combined.trim()) continue;

        const score   = extractScore(combined);
        const verdict = extractVerdict(combined);
        members.push({ name, score, verdict });
        raw[name] = combined.trim();
      }

      if (!members.length) {
        $("stateBox").innerHTML = `<div class="state-icon">📭</div><div class="state-title">No reports found</div><div>No EOD submissions for ${fromISO} → ${toISO}</div>`;
        return;
      }

      currentMembers = members;
      currentRaw     = raw;
      renderResults(members, fromISO, toISO);

    } catch(e) {
      $("stateBox").innerHTML = `<div class="state-icon">⚠️</div><div class="state-title">Error loading</div><div>${e.message}</div>`;
    }
  }

  // ── Render results ─────────────────────────────
  function renderResults(members, fromISO, toISO) {
    const sorted = [...members].sort((a,b) => (b.score??-1)-(a.score??-1));

    const green = members.filter(m => m.score !== null && m.score >= 70).length;
    const amber = members.filter(m => m.score !== null && m.score >= 40 && m.score < 70).length;
    const red   = members.filter(m => m.score === null || m.score < 40).length;

    $("pageWeek").textContent = `${formatDate(fromISO)} – ${formatDate(toISO)} · ${members.length} members`;
    $("memberCount").textContent = `${members.length} members`;

    $("pills").innerHTML = `
      <span class="pill pill-g">✓ ${green} Green</span>
      <span class="pill pill-a">⚡ ${amber} Amber</span>
      <span class="pill pill-r">✕ ${red} Red</span>`;

    $("lbRows").innerHTML = sorted.map((m, i) => `
      <div class="lb-row" data-name="${m.name}">
        <span class="lb-rank">${i+1}</span>
        <span class="lb-name">${m.name}</span>
        <span class="lb-verdict">${m.verdict || "—"}</span>
        <span class="sc ${scClass(m.score)}">${m.score ?? "—"}</span>
      </div>`).join("");

    const alpha = [...members].sort((a,b) => a.name.localeCompare(b.name));
    $("cards").innerHTML = alpha.map(m => `
      <div class="card" data-name="${m.name}">
        <div class="card-head">
          <span class="card-name">${m.name}</span>
          <span class="sc ${scClass(m.score)}">${m.score ?? "—"}</span>
        </div>
        <div class="card-foot">${m.verdict || "Click to view full report"}</div>
      </div>`).join("");

    document.querySelectorAll(".lb-row, .card").forEach(el => {
      el.onclick = () => openDetail(el.dataset.name);
    });

    $("stateBox").style.display = "none";
    $("results").style.display = "";
  }

  // ── Detail view ────────────────────────────────
  function openDetail(name) {
    const member = currentMembers.find(m => m.name === name);
    const rawText = currentRaw[name] || "";

    const scoreHTML = member.score !== null
      ? `<span class="score-badge ${scoreClass(member.score)}">Score: ${member.score}/100</span>`
      : "";

    $("detailContent").innerHTML = `
      <div class="md-body">
        <h1>Weekly Performance Audit — ${name}</h1>
        <div class="meta-line">Period: ${formatDate(selectedFrom)} – ${formatDate(selectedTo)}</div>
        ${scoreHTML}
        ${renderMarkdown(rawText)}
      </div>`;

    $("detailCopy").onclick = () => {
      navigator.clipboard.writeText(rawText).then(() => {
        $("detailCopy").textContent = "Copied! ✓";
        $("detailCopy").classList.add("copied");
        setTimeout(() => {
          $("detailCopy").textContent = "Copy Raw Report";
          $("detailCopy").classList.remove("copied");
        }, 2000);
      });
    };

    $("detailOverlay").classList.add("on");
  }

  $("detailClose").onclick = () => $("detailOverlay").classList.remove("on");
  $("detailOverlay").onclick = e => {
    if (e.target === $("detailOverlay")) $("detailOverlay").classList.remove("on");
  };
</script>
</body>
</html>
